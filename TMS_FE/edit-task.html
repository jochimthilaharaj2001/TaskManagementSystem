<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - Task Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="layout-sidebar"></aside>
        <div id="layout-overlay"></div>

        <!-- Main Window -->
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <a href="tasks.html" style="color: var(--text-muted); font-size: 0.875rem; text-decoration: none; display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.5rem;">
                        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                        Back to Tasks
                    </a>
                    <h1>Edit Task</h1>
                    <p>Modify task attributes, status, and reassignment options</p>
                </div>
            </div>

            <div class="content-grid" style="max-width: 650px;">
                <div class="card">
                    <h3 class="form-title">
                        <svg style="width: 20px; height: 20px; color: var(--primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                        </svg>
                        Update Task Form
                    </h3>
                    
                    <form id="edit-task-form" novalidate>
                        <!-- Title -->
                        <div class="form-group">
                            <label for="task-title">Task Title</label>
                            <input type="text" id="task-title" class="form-control" placeholder="Specify task name" required>
                            <span class="error-text" id="title-error">Task Title is required (max 200 chars).</span>
                        </div>

                        <!-- Description -->
                        <div class="form-group">
                            <label for="task-desc">Description (Optional)</label>
                            <textarea id="task-desc" class="form-control" placeholder="Provide detailed objectives and instructions..."></textarea>
                            <span class="error-text" id="desc-error">Description is too long (max 500 chars).</span>
                        </div>

                        <!-- Grid for User & Status -->
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <!-- Assigned User -->
                            <div class="form-group">
                                <label for="task-user">Assigned User</label>
                                <select id="task-user" class="form-control" required>
                                    <option value="" disabled>Loading users...</option>
                                </select>
                                <span class="error-text" id="user-error">An assignee must be selected.</span>
                            </div>

                            <!-- Initial Status -->
                            <div class="form-group">
                                <label for="task-status">Status</label>
                                <select id="task-status" class="form-control" required>
                                    <option value="Todo">Todo</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Done">Done</option>
                                </select>
                                <span class="error-text" id="status-error">Invalid status selection.</span>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                            <a href="tasks.html" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary" id="submit-task-btn">
                                Save Task Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        let currentTaskId = null;
        let taskData = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderLayout('tasks');
            currentTaskId = getQueryParam('id');
            
            if (currentTaskId) {
                initializeForm(currentTaskId);
            } else {
                showToast('error', 'Error', 'No Task ID specified in URL query.');
                document.getElementById('submit-task-btn').disabled = true;
            }

            const form = document.getElementById('edit-task-form');
            form.addEventListener('submit', handleEditTaskSubmit);

            // Input monitors for instant validation response
            document.getElementById('task-title').addEventListener('input', validateTaskTitle);
            document.getElementById('task-desc').addEventListener('input', validateTaskDescription);
            document.getElementById('task-user').addEventListener('change', validateAssignee);
        });

        // Validation constraints
        function validateTaskTitle() {
            return validateField(
                'task-title',
                (val) => val.length > 0 && val.length <= 200,
                'title-error',
                'Task title is required and cannot exceed 200 characters.'
            );
        }

        function validateTaskDescription() {
            return validateField(
                'task-desc',
                (val) => val.length <= 500,
                'desc-error',
                'Description cannot exceed 500 characters.'
            );
        }

        function validateAssignee() {
            return validateField(
                'task-user',
                (val) => val !== "" && val !== null,
                'user-error',
                'An active user must be assigned to this task.'
            );
        }

        async function initializeForm(taskId) {
            // First load users list
            const userSelect = document.getElementById('task-user');
            const usersResponse = await apiFetch('/api/users');
            
            if (!usersResponse || !usersResponse.success || !usersResponse.data) {
                userSelect.innerHTML = `<option value="" disabled>Error loading users</option>`;
                return;
            }
            
            const users = usersResponse.data;
            userSelect.innerHTML = users.map(u => `<option value="${u.userId}">${escapeHtml(u.userName)} (${escapeHtml(u.email)})</option>`).join('');

            // Then fetch task details
            // Call API GET /api/tasks/{id}
            const taskResponse = await apiFetch(`/api/tasks/${taskId}`);
            
            if (!taskResponse || !taskResponse.success || !taskResponse.data) {
                showToast('error', 'Error Loading Task', 'The task could not be retrieved from the server.');
                document.getElementById('submit-task-btn').disabled = true;
                return;
            }

            taskData = taskResponse.data;

            // Populate form inputs
            document.getElementById('task-title').value = taskData.title;
            document.getElementById('task-desc').value = taskData.description || '';
            document.getElementById('task-status').value = taskData.status || 'Todo';
            document.getElementById('task-user').value = taskData.userId;
        }

        async function handleEditTaskSubmit(e) {
            e.preventDefault();

            // Run validation check
            const isTitleValid = validateTaskTitle();
            const isDescValid = validateTaskDescription();
            const isUserValid = validateAssignee();

            if (!isTitleValid || !isDescValid || !isUserValid) {
                showToast('error', 'Form Invalid', 'Please check validation highlights and correct errors.');
                return;
            }

            const title = document.getElementById('task-title').value.trim();
            const description = document.getElementById('task-desc').value.trim();
            const userId = parseInt(document.getElementById('task-user').value);
            const status = document.getElementById('task-status').value;
            const submitBtn = document.getElementById('submit-task-btn');

            // Call API PUT /api/tasks/{id}
            const response = await apiFetch(`/api/tasks/${currentTaskId}`, {
                method: 'PUT',
                body: JSON.stringify({
                    title,
                    description,
                    status,
                    userId
                }),
                submitButton: submitBtn
            });

            if (response && response.success) {
                showToast('success', 'Task Updated', `Changes for task "${title}" saved successfully!`);
                
                setTimeout(() => {
                    window.location.href = 'tasks.html';
                }, 1000);
            }
        }
    </script>
</body>
</html>
